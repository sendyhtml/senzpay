<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenzPay - QRIS Merchant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header dengan tombol back -->
        <div class="header-with-back">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>QRIS Merchant</h2>
        </div>

        <!-- Board Saldo QRIS -->
        <div class="qris-board">
            <div class="qris-balance-card">
                <span>Saldo QRIS</span>
                <h2 id="saldoQrisDetail">Rp 0</h2>
            </div>

            <!-- Tombol Aksi QRIS -->
            <div class="qris-actions">
                <button class="btn-qris" id="btnQrisAjaib">
                    <i class="fas fa-magic"></i>
                    QRIS AJAIB
                </button>
                <button class="btn-qris" id="btnMutasi">
                    <i class="fas fa-exchange-alt"></i>
                    MUTASI QRIS
                </button>
                <button class="btn-qris" id="btnCairkan">
                    <i class="fas fa-wallet"></i>
                    Cairkan ke Akun
                </button>
            </div>

            <!-- Modal Konfirmasi Transfer -->
            <div id="confirmModal" class="modal">
                <div class="modal-content">
                    <h3>Konfirmasi Transfer</h3>
                    <p>Upload bukti transfer untuk QRIS AJAIB</p>
                    <input type="file" id="buktiTransfer" accept="image/*">
                    <div class="modal-buttons">
                        <button class="btn-secondary" onclick="closeModal()">Batal</button>
                        <button class="btn-primary" onclick="confirmTransfer()">Konfirmasi</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigasi Bawah -->
        <nav class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="window.location.href='profile.html'">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </button>
            <button class="nav-item" onclick="window.location.href='riwayat.html'">
                <i class="fas fa-history"></i>
                <span>Riwayat</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
