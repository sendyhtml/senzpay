<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenzPay - Withdraw</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-with-back">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>Withdraw</h2>
        </div>

        <div class="withdraw-content">
            <div class="form-group">
                <label>Pilih Metode Penarikan</label>
                <select id="withdrawMethod" class="form-input">
                    <option value="bank_bca">Bank BCA</option>
                    <option value="bank_mandiri">Bank Mandiri</option>
                    <option value="bank_bri">Bank BRI</option>
                    <option value="bank_bni">Bank BNI</option>
                    <option value="ovo">OVO</option>
                    <option value="dana">DANA</option>
                    <option value="gopay">GoPay</option>
                    <option value="linkaja">LinkAja</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nomor Rekening / E-Wallet</label>
                <input type="text" id="accountNumber" class="form-input" placeholder="Masukkan nomor tujuan">
            </div>

            <div class="form-group">
                <label>Jumlah Penarikan</label>
                <input type="number" id="withdrawAmount" class="form-input" placeholder="Masukkan nominal">
            </div>

            <button class="btn-withdraw" onclick="processWithdraw()">TARIK</button>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="window.location.href='profile.html'">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </button>
            <button class="nav-item" onclick="window.location.href='riwayat.html'">
                <i class="fas fa-history"></i>
                <span>Riwayat</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
