<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenzPay - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-with-back">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>Profile</h2>
        </div>

        <div class="profile-content">
            <div class="profile-avatar">
                <i class="fas fa-user-circle"></i>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="profileUsername" class="form-input" value="Loading...">
                <button class="btn-small" onclick="updateUsername()">Ubah</button>
            </div>

            <div class="form-group">
                <label>Password Baru</label>
                <input type="password" id="newPassword" class="form-input" placeholder="Password baru">
            </div>

            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password" id="confirmNewPassword" class="form-input" placeholder="Konfirmasi password">
            </div>

            <button class="btn-update" onclick="updatePassword()">Update Password</button>
            <button class="btn-logout" onclick="logout()">Log Out</button>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="nav-item active" onclick="window.location.href='profile.html'">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </button>
            <button class="nav-item" onclick="window.location.href='riwayat.html'">
                <i class="fas fa-history"></i>
                <span>Riwayat</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
