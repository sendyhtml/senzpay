<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zenzpay | profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="header-nav">
            <button class="back-btn" onclick="window.location.href='/index'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>profile</h1>
        </div>

        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <h2 id="profileName">Loading...</h2>
        </div>

        <div class="profile-section">
            <h3>ubah username</h3>
            <div class="input-group">
                <input type="text" id="newUsername" placeholder="username baru">
                <button class="profile-btn" onclick="updateUsername()">simpan</button>
            </div>
        </div>

        <div class="profile-section">
            <h3>ubah password</h3>
            <div class="input-group">
                <input type="password" id="currentPassword" placeholder="password saat ini">
            </div>
            <div class="input-group">
                <input type="password" id="newPassword" placeholder="password baru">
            </div>
            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="konfirmasi password">
            </div>
            <button class="profile-btn full" onclick="updatePassword()">update password</button>
        </div>

        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            logout
        </button>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='/index'">
                <i class="fas fa-home"></i>
                <span>home</span>
            </button>
            <button class="nav-item active" onclick="window.location.href='/profile'">
                <i class="fas fa-user"></i>
                <span>profile</span>
            </button>
            <button class="nav-item" onclick="window.location.href='/riwayat'">
                <i class="fas fa-history"></i>
                <span>riwayat</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
