<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zenzpay | qris merchant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- header with back -->
        <div class="header-nav">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>qris merchant</h1>
        </div>

        <!-- main qris container -->
        <div class="qris-container">
            <!-- saldo qris card -->
            <div class="qris-balance">
                <span class="balance-label">saldo qris</span>
                <span class="balance-value" id="qrisDetail">Rp 0</span>
            </div>

            <!-- qris action buttons -->
            <div class="qris-actions">
                <button class="qris-btn" id="btnAjaib">
                    <i class="fas fa-bolt"></i>
                    qris ajaib
                </button>
                <button class="qris-btn" id="btnMutasi">
                    <i class="fas fa-sync"></i>
                    mutasi qris
                </button>
                <button class="qris-btn" id="btnCair">
                    <i class="fas fa-wallet"></i>
                    cairkan
                </button>
            </div>
        </div>

        <!-- modal qr code -->
        <div class="modal" id="qrModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>scan qris</h3>
                    <button class="modal-close" onclick="closeQRModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="qr-wrapper">
                        <div id="qrcode"></div>
                    </div>
                    <div class="qr-info">
                        <p>bayar menggunakan aplikasi qris</p>
                        <p class="qr-amount" id="qrAmount">Rp 50.000</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn secondary" onclick="closeQRModal()">tutup</button>
                    <button class="modal-btn primary" id="confirmPayment">sudah bayar</button>
                </div>
            </div>
        </div>

        <!-- bottom navigation -->
        <nav class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i>
                <span>home</span>
            </button>
            <button class="nav-item" onclick="window.location.href='profile.html'">
                <i class="fas fa-user"></i>
                <span>profile</span>
            </button>
            <button class="nav-item" onclick="window.location.href='riwayat.html'">
                <i class="fas fa-history"></i>
                <span>riwayat</span>
            </button>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
    <script src="qris.js"></script>
</body>
</html>
