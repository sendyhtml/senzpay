<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zenzpay | dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- header dengan sapaan -->
        <div class="header">
            <div class="greeting">
                <span class="greeting-time" id="greetingTime">PAGI</span>
                <span class="greeting-user" id="userName">Loading...</span>
            </div>
        </div>

        <!-- cards saldo -->
        <div class="cards">
            <div class="card">
                <div class="card-header">
                    <span class="card-label">saldo akun</span>
                    <button class="toggle-btn" id="toggleSaldo">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="card-value" id="saldoAkun">
                    <span class="currency">Rp</span>
                    <span class="value hidden" id="akunValue">0</span>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-label">saldo qris</span>
                </div>
                <div class="card-value" id="saldoQris">
                    <span class="currency">Rp</span>
                    <span class="value hidden" id="qrisValue">0</span>
                </div>
            </div>
        </div>

        <!-- action buttons -->
        <div class="actions">
            <button class="btn" onclick="window.location.href='/withdraw'">
                <i class="fas fa-arrow-up"></i>
                withdraw
            </button>
            <button class="btn" onclick="window.location.href='/help'">
                <i class="fas fa-question"></i>
                bantuan
            </button>
            <button class="btn primary" onclick="window.location.href='/qris'">
                <i class="fas fa-qrcode"></i>
                qris
            </button>
        </div>

        <!-- bottom navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="window.location.href='/index'">
                <i class="fas fa-home"></i>
                <span>home</span>
            </button>
            <button class="nav-item" onclick="window.location.href='/profile'">
                <i class="fas fa-user"></i>
                <span>profile</span>
            </button>
            <button class="nav-item" onclick="window.location.href='/riwayat'">
                <i class="fas fa-history"></i>
                <span>riwayat</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
