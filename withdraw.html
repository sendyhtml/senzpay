<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zenzpay | withdraw</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="header-nav">
            <button class="back-btn" onclick="navigateTo('index')">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>withdraw</h1>
        </div>

        <div class="withdraw-form">
            <div class="form-group">
                <label>metode</label>
                <select id="withdrawMethod" class="form-select">
                    <option value="bca">🏦 BCA</option>
                    <option value="mandiri">🏦 Mandiri</option>
                    <option value="bri">🏦 BRI</option>
                    <option value="bni">🏦 BNI</option>
                    <option value="ovo">📱 OVO</option>
                    <option value="dana">📱 DANA</option>
                    <option value="gopay">📱 GoPay</option>
                </select>
            </div>

            <div class="form-group">
                <label>nomor tujuan</label>
                <input type="text" id="accountNumber" class="form-input" placeholder="contoh: 1234567890">
            </div>

            <div class="form-group">
                <label>nominal</label>
                <input type="number" id="withdrawAmount" class="form-input" placeholder="minimal Rp 50.000">
            </div>

            <div class="form-info">
                <p>saldo tersedia: <span id="availableBalance">Rp 0</span></p>
            </div>

            <button class="withdraw-submit" onclick="processWithdraw()">
                tarik dana
            </button>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="navigateTo('index')">
                <i class="fas fa-home"></i>
                <span>home</span>
            </button>
            <button class="nav-item" onclick="navigateTo('profile')">
                <i class="fas fa-user"></i>
                <span>profile</span>
            </button>
            <button class="nav-item" onclick="navigateTo('riwayat')">
                <i class="fas fa-history"></i>
                <span>riwayat</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
