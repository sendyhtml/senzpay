<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenzPay - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header dengan sapaan -->
        <div class="header-blue">
            <div class="greeting">
                Selamat <span id="greetingTime">Pagi</span>, <span id="userName">Loading...</span>
            </div>
        </div>

        <!-- Kartu Saldo -->
        <div class="balance-cards">
            <div class="balance-card">
                <div class="balance-header">
                    <span>Saldo Akun</span>
                    <button class="toggle-balance" id="toggleSaldo"><i class="fas fa-eye"></i></button>
                </div>
                <div class="balance-amount" id="saldoAkun">Rp <span class="hidden-balance">0</span></div>
            </div>
            <div class="balance-card">
                <div class="balance-header">
                    <span>Saldo QRIS</span>
                </div>
                <div class="balance-amount" id="saldoQris">Rp <span class="hidden-balance">0</span></div>
            </div>
        </div>

        <!-- Tombol Aksi -->
        <div class="action-buttons">
            <button class="btn-action" onclick="window.location.href='withdraw.html'">Withdraw</button>
            <button class="btn-action" onclick="window.location.href='help.html'">Bantuan</button>
            <button class="btn-action" onclick="window.location.href='qris.html'">QRIS</button>
        </div>

        <!-- Navigasi Bawah -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="window.location.href='profile.html'">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </button>
            <button class="nav-item" onclick="window.location.href='riwayat.html'">
                <i class="fas fa-history"></i>
                <span>Riwayat</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
